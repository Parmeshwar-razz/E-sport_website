<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-sports Event Coming Soon">
    <title>E-sports Event - Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-container"></div>
    <img src="assets/Raze.png" alt="" class="char-bg char-left">
    <img src="assets/4.png" alt="" class="char-bg char-right">

    <header class="header">
        <div class="logo-container top-left">
            <img src="assets/Biyani Clg Logo(white).png" alt="Biyani College Logo" class="college-logo">
        </div>
        <div class="logo-container top-right">
            <img src="assets/BGMI.png" alt="BGMI Logo" class="game-logo bgmi-logo">
            <img src="assets/valorant.png" alt="Valorant Logo" class="game-logo valorant-logo">
        </div>
    </header>

    <main class="main-content">
        <div class="content-wrapper">
            <h2 class="subtitle glitch" data-text="THE ULTIMATE TOURNAMENT"> Biyani Inter College ESports Champion</h2>
            <h1 class="main-title glitch" data-text="COMING SOON">COMING SOON</h1>
            <div class="decorative-line"></div>
            <p class="description">Victory begins here. Mobilize your squad for the Biyani Group of Colleges Esports
                Arena.</p>
            <button class="notify-btn" id="notifyBtn">
                <span class="btn-text">STAY UPDATED</span>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
